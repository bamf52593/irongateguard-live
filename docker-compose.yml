services:
  postgres:
    image: postgres:17
    container_name: irongate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: irongate
    ports:
      - "5433:5432"
    volumes:
      - irongate_pgdata:/var/lib/postgresql/data

volumes:
  irongate_pgdata: