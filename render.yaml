services:
  - type: web
    name: irongate
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: true
      - key: DB_AUTO_MIGRATE
        value: true
      - key: BILLING_HEALTH_CHECKS_ENABLED
        value: true
      - key: LIVE_BILLING_REQUIRE_LIVE_KEYS
        value: true
      - key: BILLING_API_BASE
        value: https://irongateguard.com/v1
      - key: DATABASE_URL
        fromDatabase:
          name: irongate-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://irongateguard.com
      - key: VITE_API_URL
        value: https://irongateguard.com/v1
      - key: CORS_ORIGIN
        value: https://irongateguard.com
      - key: FROM_EMAIL
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: SALES_EMAIL
        sync: false
      - key: BILLING_ADMIN_EMAIL
        sync: false
      - key: BILLING_ADMIN_PASSWORD
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: irongate-db
    plan: starter
    databaseName: irongate
    user: irongate
